services:
  - type: web
    name: stock-price-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: GROQ_API_KEY
        sync: false # User needs to configure this in the Render dashboard
